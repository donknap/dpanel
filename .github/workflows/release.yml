name: Release
permissions: write-all
on:
  push:
    tags:
      - 'v*'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version_param: ${{ steps.set_param.outputs.version_param }}
      is_prerelease: ${{ steps.set_param.outputs.is_prerelease }}
    steps:
      - name: Determine Version Param
        id: set_param
        run: |
          TAG=${GITHUB_REF_NAME#v}
          # 严格判断是否以 -beta 结尾
          if [[ "$TAG" == *-beta ]]; then
            echo "🚧 Beta release detected (tag ends with -beta). Using timestamp for version."
            echo "version_param=" >> $GITHUB_OUTPUT
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "📦 Stable release detected. Using tag $TAG for version."
            echo "version_param=VERSION=$TAG" >> $GITHUB_OUTPUT
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: prepare
    strategy:
      matrix:
        family: [ce, pe, nw, sy]
    runs-on: ubuntu-latest
    env:
      VERSION_PARAM: ${{ needs.prepare.outputs.version_param }}
    steps:
      - name: Test Env
        run: |
          echo "Tag name from GITHUB_REF_NAME: $GITHUB_REF_NAME"
          echo "Tag name from github.ref_name: ${{  github.ref_name }}"
          echo "Tag name from github.ref: ${{  github.ref }}"
          echo "Runs name: ${{runner.os}}"
          echo "Global Version Param is: '${{ env.VERSION_PARAM }}'"

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.MY_GITHUB_TOKEN }}
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install dependencies
        run: |
          go get .
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          name: dpanel-context-local-builder
          driver-opts: image=moby/buildkit:master
          install: true
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to ALiYun
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_TOKEN }}
      - name: Prepare Toolchains
        run: |
          #          # GNU Toolchains
          #          curl -Lo arm64.tar.xz https://github.com/donknap/dpanel/releases/download/toolchains-v1/arm64.tar.xz && tar -xf arm64.tar.xz
          #          curl -Lo arm.tar.xz https://github.com/donknap/dpanel/releases/download/toolchains-v1/arm.tar.xz && tar -xf arm.tar.xz
          #          # Musl Toolchains
          #          curl -Lo amd64-musl.tgz https://github.com/donknap/dpanel/releases/download/toolchains-v1/amd64-musl.tgz && tar xzf amd64-musl.tgz
          #          curl -Lo arm64-musl.tgz https://github.com/donknap/dpanel/releases/download/toolchains-v1/arm64-musl.tgz && tar xzf arm64-musl.tgz
          #          curl -Lo arm-musl.tgz https://github.com/donknap/dpanel/releases/download/toolchains-v1/arm-musl.tgz && tar zxf arm-musl.tgz
          # Synology Toolchains
          curl -Lo armv8-synology.txz https://github.com/donknap/dpanel/releases/download/toolchains-v1/armv8-synology.txz && tar -Jvxf armv8-synology.txz
          curl -Lo amd64-synology.txz https://github.com/donknap/dpanel/releases/download/toolchains-v1/amd64-synology.txz && tar -Jvxf amd64-synology.txz
      - name: Build PE Version
        if: matrix.family == 'pe'
        env:
          GARBLE_SEED: ${{ secrets.GARBLE_SEED }}
          GIT_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          make release FAMILY=pe ${{ env.VERSION_PARAM }} AMD64=1 ARM64=1 ARM7=1 OS=linux LITE=0 HUB=1 GARBLE=1 GARBLE_SEED=${{ secrets.GARBLE_SEED }} GIT_TOKEN=${{ secrets.MY_GITHUB_TOKEN }} GNU=1
          make release FAMILY=pe ${{ env.VERSION_PARAM }} AMD64=1 ARM64=1 ARM7=1 OS=linux LITE=0 HUB=1 GARBLE=1 GARBLE_SEED=${{ secrets.GARBLE_SEED }} GIT_TOKEN=${{ secrets.MY_GITHUB_TOKEN }}
      - name: Build CE Version
        if: matrix.family == 'ce'
        run: |
          make release FAMILY=ce ${{ env.VERSION_PARAM }} AMD64=1 ARM64=1 ARM7=1 OS=linux LITE=0 HUB=1 GNU=1
          make release FAMILY=ce ${{ env.VERSION_PARAM }} AMD64=1 ARM64=1 ARM7=1 OS=linux LITE=0 HUB=1
      - name: Build NW Version
        if: matrix.family == 'nw'
        run: |
          make release FAMILY=nw ${{ env.VERSION_PARAM }} AMD64=1 ARM64=1 OS=linux HUB=1
      - name: Build SY (Synology) Version
        if: matrix.family == 'sy'
        run: |
          make build ${{ env.VERSION_PARAM }} PROJECT_NAME=dpanel-synology-arm64 ARM64=1 ARM64_CC=${PWD}/aarch64-unknown-linux-gnu/bin/aarch64-unknown-linux-gnu-gcc
          make build ${{ env.VERSION_PARAM }} PROJECT_NAME=dpanel-synology-amd64 AMD64=1 AMD64_CC=${PWD}/x86_64-pc-linux-gnu/bin/x86_64-pc-linux-gnu-gcc
      - name: Flatten Artifact Directories
        run: |
          find runtime -mindepth 2 -type f -name 'dpanel-*' -exec mv -f {} runtime/ \; || true
          find runtime -mindepth 1 -type d -empty -delete || true
      - name: upload artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: runtime/*
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}

  macos-build:
    needs: prepare
    strategy:
      matrix:
        platform: [ 'macos-15-intel', 'macos-latest' ]
        go-version: [ '1.25' ]
    runs-on: ${{ matrix.platform }}
    env:
      VERSION_PARAM: ${{ needs.prepare.outputs.version_param }}
    steps:
      - name: Test Env
        run: |
          echo "Tag name from GITHUB_REF_NAME: $GITHUB_REF_NAME"
          echo "Tag name from github.ref_name: ${{  github.ref_name }}"
          echo "Tag name from github.ref: ${{  github.ref }}"
          echo "Runs name: ${{runner.os}}"
          echo "Global Version Param is: '${{ env.VERSION_PARAM }}'"
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Install dependencies
        run: go get .
      - name: Build
        run: |
          export CC=$(which clang)
          if [ "${{ runner.arch }}" = "X64" ]; then
            make build ${{ env.VERSION_PARAM }} AMD64=1 PROJECT_NAME=dpanel-darwin-amd64 AMD64_CC=$CC
          else
            make build ${{ env.VERSION_PARAM }} ARM64=1 PROJECT_NAME=dpanel-darwin-arm64 ARM64_CC=$CC
          fi
      - name: upload artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: runtime/*
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}

  windows-build:
    needs: prepare
    strategy:
      matrix:
        platform: [ 'windows-latest' ]
        go-version: [ '1.25' ]
    runs-on: ${{ matrix.platform }}
    env:
      VERSION_PARAM: ${{ needs.prepare.outputs.version_param }}
    steps:
      - name: Test Env
        run: |
          echo "Tag name from GITHUB_REF_NAME: $GITHUB_REF_NAME"
          echo "Tag name from github.ref_name: ${{  github.ref_name }}"
          echo "Tag name from github.ref: ${{  github.ref }}"
          echo "Runs name: ${{runner.os}}"
          echo "Global Version Param is: '${{ env.VERSION_PARAM }}'"
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Install dependencies
        run: go get .
      - name: Install Make
        run: choco install make -y
      - name: Build
        shell: bash
        run: |
          make build ${{ env.VERSION_PARAM }} OS=windows AMD64=1 PROJECT_NAME=dpanel.exe AMD64_CC=gcc
      - name: upload artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: runtime/*
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}

  xk-build:
    needs: prepare
    strategy:
      matrix:
        platform: [ 'ubuntu-latest' ]
        go-version: [ '1.25' ]
    runs-on: ${{ matrix.platform }}
    env:
      VERSION_PARAM: ${{ needs.prepare.outputs.version_param }}
    steps:
      - name: Test Env
        run: |
          echo "Tag name from GITHUB_REF_NAME: $GITHUB_REF_NAME"
          echo "Tag name from github.ref_name: ${{  github.ref_name }}"
          echo "Tag name from github.ref: ${{  github.ref }}"
          echo "Runs name: ${{runner.os}}"
          echo "Global Version Param is: '${{ env.VERSION_PARAM }}'"
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.MY_GITHUB_TOKEN }}
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Install dependencies
        run: go get .
      - name: Build
        run: |
          make -C app/pro/tests/xk_open clean libxksssopen.so
          make clean 
          make build PROJECT_NAME=dpanel-xk-amd64 FAMILY=xk CGO_ENABLED=1 ${{ env.VERSION_PARAM }} AMD64=1 AMD64_CC=gcc
      - name: upload artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: runtime/*
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}

  push-tags-to-related-repos:
    needs: [ build, macos-build, windows-build, xk-build ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dpanel-gui
        uses: actions/checkout@v4
        with:
          repository: donknap/dpanel-gui
          token: ${{ secrets.MY_GITHUB_TOKEN }}
          path: dpanel-gui

      - name: Push tag to dpanel-gui
        working-directory: ./dpanel-gui
        run: |
          TAG=${{ github.ref_name }}
          git config user.name "donknap"
          git config user.email "donknap@gmail.com"
          git tag -f "$TAG"
          git push origin "$TAG" --force

      - name: Checkout dpanel-fnnas
        uses: actions/checkout@v4
        with:
          repository: donknap/dpanel-fnnas
          token: ${{ secrets.MY_GITHUB_TOKEN }}
          path: dpanel-fnnas

      - name: Push tag to dpanel-fnnas
        working-directory: ./dpanel-fnnas
        run: |
          TAG=${{ github.ref_name }}
          git config user.name "donknap"
          git config user.email "donknap@gmail.com"
          git tag -f "$TAG"
          git push origin "$TAG" --force