name: Release
permissions: write-all
on:
  push:
    tags:
      - 'v*'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version_param: ${{ steps.set_param.outputs.version_param }}
      is_prerelease: ${{ steps.set_param.outputs.is_prerelease }}
    steps:
      - name: Determine Version Param
        id: set_param
        run: |
          TAG=${GITHUB_REF_NAME#v}
          # 严格判断是否以 -beta 结尾
          if [[ "$TAG" == *-beta ]]; then
            echo "🚧 Beta release detected (tag ends with -beta). Using timestamp for version."
            echo "version_param=" >> $GITHUB_OUTPUT
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "📦 Stable release detected. Using tag $TAG for version."
            echo "version_param=APP_VERSION=$TAG" >> $GITHUB_OUTPUT
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: prepare
    strategy:
      fail-fast: true
      matrix:
        include:
          - family: ce
            libc: gnu
            build_os: linux
            armv7: 1
            make_args: "APP_FAMILY=ce APP_ENV=all OS=linux PUSH=all LIBC=gnu"
          - family: ce
            libc: musl
            build_os: linux
            armv7: 1
            make_args: "APP_FAMILY=ce APP_ENV=all OS=linux PUSH=all LIBC=musl"
          - family: ce
            libc: gnu
            build_os: windows
            armv7: 0
            make_args: "BUILD_OS=windows APP_FAMILY=ce APP_ENV=all PUSH=all"
          - family: nw
            libc: musl
            build_os: linux
            armv7: 0
            make_args: "APP_FAMILY=nw APP_ENV=lite OS=linux PUSH=all"
          - family: sy
            libc: musl
            build_os: linux
            armv7: 0
            make_args: ""
    runs-on: ubuntu-latest
    env:
      VERSION_PARAM: ${{ needs.prepare.outputs.version_param }}
    steps:
      - name: Test Env
        run: |
          echo "Tag name from GITHUB_REF_NAME: $GITHUB_REF_NAME"
          echo "Tag name from github.ref_name: ${{  github.ref_name }}"
          echo "Tag name from github.ref: ${{  github.ref }}"
          echo "Runs name: ${{runner.os}}"
          echo "Global Version Param is: '${{ env.VERSION_PARAM }}'"

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.MY_GITHUB_TOKEN }}
        with:
          submodules: recursive
          token: ${{ secrets.MY_GITHUB_TOKEN }}
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          name: dpanel-context-local-builder
          driver-opts: image=moby/buildkit:master
          install: true
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to ALiYun
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_TOKEN }}

      - name: Build CE Version
        if: matrix.family == 'ce'
        env:
          DOCKER_EXT_ARGS: "--cache-from type=gha,scope=ce-${{ matrix.build_os }}-${{ matrix.libc }} --cache-to type=gha,mode=max,scope=ce-${{ matrix.build_os }}-${{ matrix.libc }}"
        run: |
          make release ${{ env.VERSION_PARAM }} AMD64=1 ARM64=1 ARMV7=${{ matrix.armv7 }} ${{ matrix.make_args }} DOCKER_EXT_ARGS="${DOCKER_EXT_ARGS}"

      - name: Build NW Version
        if: matrix.family == 'nw'
        run: |
          make release APP_FAMILY=nw APP_ENV=lite ${{ env.VERSION_PARAM }} AMD64=1 ARM64=1 OS=linux PUSH=all

      - name: Build SY (Synology) Version
        if: matrix.family == 'sy'
        run: |
          # Synology Toolchains
          curl -Lo armv8-synology.txz https://github.com/DPanel-dev/actions/releases/download/build-toolchain/armv8-synology.txz && tar -Jvxf armv8-synology.txz
          curl -Lo amd64-synology.txz https://github.com/DPanel-dev/actions/releases/download/build-toolchain/amd64-synology.txz && tar -Jvxf amd64-synology.txz
          make build ${{ env.VERSION_PARAM }} PROJECT_NAME=dpanel-synology-arm64 ARM64=1 CC_ARM64=${PWD}/aarch64-unknown-linux-gnu/bin/aarch64-unknown-linux-gnu-gcc
          make build ${{ env.VERSION_PARAM }} PROJECT_NAME=dpanel-synology-amd64 AMD64=1 CC_AMD64=${PWD}/x86_64-pc-linux-gnu/bin/x86_64-pc-linux-gnu-gcc

      - name: Flatten Artifact Directories
        run: |
          find runtime -mindepth 2 -type f -name 'dpanel-*' -exec mv -f {} runtime/ \; || true
          find runtime -mindepth 1 -type d -empty -delete || true

      - name: upload artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: runtime/*
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}

  build-pe:
    needs: [prepare, build]
    strategy:
      fail-fast: true
      matrix:
        include:
          - libc: gnu
            build_os: linux
            armv7: 1
            make_args: "APP_FAMILY=pe APP_ENV=all OS=linux PUSH=all LIBC=gnu GARBLE=1"
          - libc: musl
            build_os: linux
            armv7: 1
            make_args: "APP_FAMILY=pe APP_ENV=all OS=linux PUSH=all LIBC=musl GARBLE=1"
          - libc: gnu
            build_os: windows
            armv7: 0
            make_args: "BUILD_OS=windows APP_FAMILY=pe APP_ENV=all PUSH=all GARBLE=1"
    runs-on: ubuntu-latest
    env:
      VERSION_PARAM: ${{ needs.prepare.outputs.version_param }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.MY_GITHUB_TOKEN }}
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          name: dpanel-context-local-builder
          driver-opts: image=moby/buildkit:master
          install: true
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to ALiYun
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_TOKEN }}

      - name: Build PE Version
        env:
          GARBLE_SEED: ${{ secrets.GARBLE_SEED }}
          GIT_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          DOCKER_EXT_ARGS: "--cache-from type=gha,scope=pe-${{ matrix.build_os }}-${{ matrix.libc }} --cache-to type=gha,mode=max,scope=pe-${{ matrix.build_os }}-${{ matrix.libc }}"
        run: |
          make release ${{ env.VERSION_PARAM }} AMD64=1 ARM64=1 ARMV7=${{ matrix.armv7 }} ${{ matrix.make_args }} GARBLE_SEED=${GARBLE_SEED} GIT_TOKEN=${GIT_TOKEN} DOCKER_EXT_ARGS="${DOCKER_EXT_ARGS}"

      - name: Flatten Artifact Directories
        run: |
          find runtime -mindepth 2 -type f -name 'dpanel-*' -exec mv -f {} runtime/ \; || true
          find runtime -mindepth 1 -type d -empty -delete || true

      - name: upload artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: runtime/*
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}

  macos-build:
    needs: prepare
    strategy:
      matrix:
        family: [ce, pe]
    runs-on: macos-15-intel
    env:
      VERSION_PARAM: ${{ needs.prepare.outputs.version_param }}
    steps:
      - name: Test Env
        run: |
          echo "Tag name from GITHUB_REF_NAME: $GITHUB_REF_NAME"
          echo "Tag name from github.ref_name: ${{  github.ref_name }}"
          echo "Tag name from github.ref: ${{  github.ref }}"
          echo "Runs name: ${{runner.os}}"
          echo "Global Version Param is: '${{ env.VERSION_PARAM }}'"
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install dependencies
        run: go get .
      - name: Set up Docker
        uses: docker/setup-docker-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          name: dpanel-context-local-builder
          driver-opts: image=moby/buildkit:master
          install: true
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to ALiYun
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_TOKEN }}
      - name: Build Darwin Binaries
        env:
          GARBLE_SEED: ${{ secrets.GARBLE_SEED }}
        run: |
          export CC=$(which clang)
          if [ "${{ matrix.family }}" = "pe" ]; then
            make build ${{ env.VERSION_PARAM }} PROJECT_NAME=dpanel-pe-darwin-amd64 APP_FAMILY=pe AMD64=1 ARM64=0 ARMV7=0 GARBLE=1 GARBLE_SEED=${GARBLE_SEED} CC_AMD64="$CC"
            make build ${{ env.VERSION_PARAM }} PROJECT_NAME=dpanel-pe-darwin-arm64 APP_FAMILY=pe AMD64=0 ARM64=1 ARMV7=0 GARBLE=1 GARBLE_SEED=${GARBLE_SEED} CC_ARM64="$CC -arch arm64"
          else
            make build ${{ env.VERSION_PARAM }} PROJECT_NAME=dpanel-ce-darwin-amd64 APP_FAMILY=ce AMD64=1 ARM64=0 ARMV7=0 CC_AMD64="$CC"
            make build ${{ env.VERSION_PARAM }} PROJECT_NAME=dpanel-ce-darwin-arm64 APP_FAMILY=ce AMD64=0 ARM64=1 ARMV7=0 CC_ARM64="$CC -arch arm64"
          fi
      - name: Build Darwin Image
        env:
          GARBLE_SEED: ${{ secrets.GARBLE_SEED }}
          GIT_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          DOCKER_EXT_ARGS: "--cache-from type=gha,scope=${{ matrix.family }}-darwin --cache-to type=gha,mode=max,scope=${{ matrix.family }}-darwin"
        run: |
          if [ "${{ matrix.family }}" = "pe" ]; then
            make release BUILD_OS=darwin APP_FAMILY=pe APP_ENV=all ${{ env.VERSION_PARAM }} AMD64=1 ARM64=1 ARMV7=0 PUSH=all GARBLE=1 GARBLE_SEED=${GARBLE_SEED} GIT_TOKEN=${GIT_TOKEN} DOCKER_EXT_ARGS="${DOCKER_EXT_ARGS}"
          else
            make release BUILD_OS=darwin APP_FAMILY=ce APP_ENV=all ${{ env.VERSION_PARAM }} AMD64=1 ARM64=1 ARMV7=0 PUSH=all DOCKER_EXT_ARGS="${DOCKER_EXT_ARGS}"
          fi
      - name: upload artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: runtime/*
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}

  windows-build:
    needs: prepare
    runs-on: windows-latest
    env:
      VERSION_PARAM: ${{ needs.prepare.outputs.version_param }}
    steps:
      - name: Test Env
        run: |
          echo "Tag name from GITHUB_REF_NAME: $GITHUB_REF_NAME"
          echo "Tag name from github.ref_name: ${{  github.ref_name }}"
          echo "Tag name from github.ref: ${{  github.ref }}"
          echo "Runs name: ${{runner.os}}"
          echo "Global Version Param is: '${{ env.VERSION_PARAM }}'"
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install dependencies
        run: go get .
      - name: Install Make
        run: choco install make -y
      - name: Build
        shell: bash
        run: |
          make build ${{ env.VERSION_PARAM }} BUILD_OS=windows PROJECT_NAME=dpanel.exe AMD64=1 CC_AMD64=gcc
      - name: upload artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: runtime/*
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}

  xk-build:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      VERSION_PARAM: ${{ needs.prepare.outputs.version_param }}
    steps:
      - name: Test Env
        run: |
          echo "Tag name from GITHUB_REF_NAME: $GITHUB_REF_NAME"
          echo "Tag name from github.ref_name: ${{  github.ref_name }}"
          echo "Tag name from github.ref: ${{  github.ref }}"
          echo "Runs name: ${{runner.os}}"
          echo "Global Version Param is: '${{ env.VERSION_PARAM }}'"
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.MY_GITHUB_TOKEN }}
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install dependencies
        run: go get .
      - name: Build
        run: |
          make -C app/pro/tests/xk_open clean libxksssopen.so
          make clean 
          make build ${{ env.VERSION_PARAM }} PROJECT_NAME=dpanel-xk-amd64 APP_FAMILY=xk AMD64=1 CC_AMD64=gcc
      - name: upload artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: runtime/*
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}

  push-tags-to-related-repos:
    needs: [ build, build-pe, macos-build, windows-build, xk-build ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dpanel-gui
        uses: actions/checkout@v4
        with:
          repository: donknap/dpanel-gui
          token: ${{ secrets.MY_GITHUB_TOKEN }}
          path: dpanel-gui

      - name: Push tag to dpanel-gui
        working-directory: ./dpanel-gui
        run: |
          TAG=${{ github.ref_name }}
          git config user.name "donknap"
          git config user.email "donknap@gmail.com"
          git push origin --delete "$TAG" || true
          git tag -f "$TAG"
          git push origin "$TAG" --force

      - name: Checkout dpanel-fnnas
        uses: actions/checkout@v4
        with:
          repository: donknap/dpanel-fnnas
          token: ${{ secrets.MY_GITHUB_TOKEN }}
          path: dpanel-fnnas

      - name: Push tag to dpanel-fnnas
        working-directory: ./dpanel-fnnas
        run: |
          TAG=${{ github.ref_name }}
          git config user.name "donknap"
          git config user.email "donknap@gmail.com"
          git push origin --delete "$TAG" || true
          git tag -f "$TAG"
          git push origin "$TAG" --force

      - name: Push tag to dpanel-pro
        uses: actions/checkout@v4
        with:
          repository: donknap/dpanel-pro
          token: ${{ secrets.MY_GITHUB_TOKEN }}
          path: dpanel-pro
          fetch-depth: 1

      - name: Push tag to dpanel-pro
        working-directory: ./dpanel-pro
        run: |
          TAG=${{ github.ref_name }}
          git config user.name "donknap"
          git config user.email "donknap@gmail.com"
          git push origin --delete "$TAG" || true
          git tag -f "$TAG"
          git push origin "$TAG" --force
