name: Download Toolchains

on:
  workflow_dispatch:  # 仅手动触发

jobs:
  download_toolchains:
    runs-on: ubuntu-latest
    steps:
      - name: Create working directory
        run: mkdir -p toolchains
      - name: Download GNU 12 Series (Stable & High Compatibility)
        continue-on-error: true
        run: |
          cd toolchains
          echo "--- Downloading GNU 12 Toolchains ---"
          # ARM64 (Arm Official 12.2)
          curl -SLO https://developer.arm.com/-/media/Files/downloads/gnu/12.2.rel1/binrel/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-linux-gnu.tar.xz
          
          # ARMhf (Arm Official 12.2)
          curl -SLO https://developer.arm.com/-/media/Files/downloads/gnu/12.2.rel1/binrel/arm-gnu-toolchain-12.2.rel1-x86_64-arm-none-linux-gnueabihf.tar.xz
          
          # AMD64 (Bootlin GCC 12.3 - Glibc 2.37)
          curl -SL -o x86_64-gnu-toolchain-12.3-x86_64-linux-gnu.tar.bz2 https://toolchains.bootlin.com/downloads/releases/toolchains/x86-64/tarballs/x86-64--glibc--stable-2023.08-1.tar.bz2

      - name: Download GNU 13 Series (Modern & Bleeding Edge)
        continue-on-error: true
        run: |
          cd toolchains
          echo "--- Downloading GNU 13 Toolchains ---"
          # ARM64 (Arm Official 13.3)
          curl -SLO https://developer.arm.com/-/media/Files/downloads/gnu/13.3.rel1/binrel/arm-gnu-toolchain-13.3.rel1-x86_64-aarch64-none-linux-gnu.tar.xz
          
          # ARMhf (Arm Official 13.3)
          curl -SLO https://developer.arm.com/-/media/Files/downloads/gnu/13.3.rel1/binrel/arm-gnu-toolchain-13.3.rel1-x86_64-arm-none-linux-gnueabihf.tar.xz
          
          # AMD64 (Bootlin GCC 13.2 - Glibc 2.38)
          curl -SL -o x86_64-gnu-toolchain-13.2-x86_64-linux-gnu.tar.bz2 https://toolchains.bootlin.com/downloads/releases/toolchains/x86-64/tarballs/x86-64--glibc--bleeding-edge-2023.11-1.tar.bz2

      - name: Download Musl Toolchains (Static CGO Support)
        continue-on-error: true
        run: |
          cd toolchains
          echo "--- Downloading Musl Toolchains ---"
          curl -SL -o x86_64-linux-musl-cross.tgz https://musl.cc/x86_64-linux-musl-cross.tgz
          curl -SL -o aarch64-linux-musl-cross.tgz https://musl.cc/aarch64-linux-musl-cross.tgz
          curl -SL -o arm-linux-musleabihf-cross.tgz https://musl.cc/arm-linux-musleabihf-cross.tgz

      - name: Download Synology Toolchains
        continue-on-error: true
        run: |
          cd toolchains
          echo "--- Downloading Synology Toolchains ---"
          curl -SLO https://global.synologydownload.com/download/ToolChain/toolchain/7.1-42661/Realtek%20RTD129x%20Linux%204.4.180/rtd1296-gcc850_glibc226_armv8-GPL.txz 
          curl -SLO https://global.synologydownload.com/download/ToolChain/toolchain/7.1-42661/Intel%20x86%20Linux%204.4.180%20%28GeminiLake%29/geminilake-gcc850_glibc226_x86_64-GPL.txz

      - name: Create Release
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: toolchains-v1
          name: "DPanel Toolchains Collection"
          body:  "Pre-built toolchains for ARM, ARM64, AMD64，MUSL and Synology platforms"
          files: toolchains/*
          draft: false
          prerelease: false
          make_latest: false