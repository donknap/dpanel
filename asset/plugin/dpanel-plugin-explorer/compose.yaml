services:
  dpanel-plugin-explorer:
    image: dpanel/explorer
    container_name: dpanel-plugin-explorer
    restart: none
    privileged: true
    pid: host
    labels:
      - "com.dpanel.container.title=DPanel-文件管理助手"
      - "com.dpanel.container.auto_remove=true"
      - "com.dpanel.container.hash={{.hash}}"
#{{if .volumes}}
    volumes:
#{{- range $key, $val := .volumes }}
      - {{ $val }}
#{{- end}}
#{{- end}}
#{{if .workingDir}}
    working_dir: {{.workingDir}}
#{{- end}}
    x-dpanel-service:
      image_tar:
        amd64: asset/plugin/dpanel-plugin-explorer/image-amd64.tar
        arm64: asset/plugin/dpanel-plugin-explorer/image-arm64.tar
        arm: asset/plugin/dpanel-plugin-explorer/image-arm.tar
      external:
        volumes:
#{{- range $key, $val := .external.volumes}}
          - {{ $val }}
#{{- end}}